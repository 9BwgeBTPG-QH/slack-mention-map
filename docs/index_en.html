function buildStatBox(v,l){return el("div",{className:"stat-box"},[el("div",{className:"stat-value",textContent:String(v)}),el("div",{className:"stat-label",textContent:l})])}
function buildSection(title,items){var sec=el("div",{className:"panel-section"});var tog=el("div",{className:"section-toggle"},[el("span",{textContent:title+" ("+items.length+")"}),el("span",{className:"arrow",textContent:"\u25B6"})]);var list=el("div",{className:"section-list"});tog.addEventListener("click",function(){tog.classList.toggle("open");list.classList.toggle("open")});items.forEach(function(item){var row=el("div",{className:"section-item"},[el("span",{textContent:item.name}),el("span",{className:"count",textContent:String(item.count)})]);row.addEventListener("click",function(){focusNode(item.email)});list.appendChild(row)});sec.appendChild(tog);sec.appendChild(list);return sec}
function drawConvexHulls(ctx){if(focusedNode)return;var pos=network.getPositions();if(!pos||Object.keys(pos).length===0)return;DATA.communities.forEach(function(comm){if(comm.size<3)return;if(clusteredCommunities.has(comm.id))return;var pts=[];comm.members.forEach(function(m){var p=pos[m.email];if(p)pts.push([p.x,p.y])});if(pts.length<3)return;var hull=grahamScan(pts);if(hull.length<3)return;var cx=hull.reduce(function(s,p){return s+p[0]},0)/hull.length;var cy=hull.reduce(function(s,p){return s+p[1]},0)/hull.length;var pad=40;ctx.beginPath();hull.forEach(function(p,i){var dx=p[0]-cx,dy=p[1]-cy,d=Math.sqrt(dx*dx+dy*dy);var ox=p[0]+(d>0?dx/d*pad:0),oy=p[1]+(d>0?dy/d*pad:0);if(i===0)ctx.moveTo(ox,oy);else ctx.lineTo(ox,oy)});ctx.closePath();ctx.fillStyle=comm.color+"14";ctx.fill();ctx.strokeStyle=comm.color+"26";ctx.lineWidth=1;ctx.stroke()})}
function grahamScan(pts){if(pts.length<3)return pts.slice();var lo=0;for(var i=1;i<pts.length;i++){if(pts[i][1]<pts[lo][1]||(pts[i][1]===pts[lo][1]&&pts[i][0]<pts[lo][0]))lo=i}var t=pts[0];pts[0]=pts[lo];pts[lo]=t;var pv=pts[0];var s=pts.slice(1).sort(function(a,b){return Math.atan2(a[1]-pv[1],a[0]-pv[0])-Math.atan2(b[1]-pv[1],b[0]-pv[0])});var st=[pv,s[0]];for(var i=1;i<s.length;i++){while(st.length>1&&crossProduct(st[st.length-2],st[st.length-1],s[i])<=0)st.pop();st.push(s[i])}return st}
function crossProduct(o,a,b){return(a[0]-o[0])*(b[1]-o[1])-(a[1]-o[1])*(b[0]-o[0])}
function onDoubleClick(p){if(p.nodes.length===0)return;var id=p.nodes[0];if(network.isCluster(id)){network.openCluster(id);var ci=parseInt(id.replace("cluster_",""),10);clusteredCommunities.delete(ci);return}var node=nodeMap[id];if(!node)return;var ci=node.community;var comm=DATA.communities[ci];if(!comm||comm.size<2)return;var me=new Set(comm.members.map(function(m){return m.email}));network.cluster({joinCondition:function(o){return me.has(o.id)},clusterNodeProperties:{id:"cluster_"+ci,label:"Cluster "+ci+" ("+comm.size+")",color:{background:comm.color,border:comm.color},size:30,shape:"dot",font:{color:"#ddd",size:13},borderWidth:2}});clusteredCommunities.add(ci)}
function switchView(v){currentView=v;var nc=document.getElementById("network-container");var wc=document.getElementById("wordcloud-container");var bn=document.getElementById("btn-network");var bw=document.getElementById("btn-wordcloud");var lg=document.getElementById("legend");if(v==="network"){nc.style.display="block";wc.style.display="none";bn.classList.add("active");bw.classList.remove("active");lg.style.display="block";if(network)network.redraw()}else{nc.style.display="none";wc.style.display="block";bn.classList.remove("active");bw.classList.add("active");lg.style.display="none";renderWordCloud()}}
function renderWordCloud(){var cv=document.getElementById("wordcloud-canvas");var ct=document.getElementById("wordcloud-container");cv.width=ct.clientWidth;cv.height=ct.clientHeight;if(DATA.wordcloud_data.length===0)return;var mx=Math.max.apply(null,DATA.wordcloud_data.map(function(d){return d.size}));var mnF=12,mxF=Math.min(80,cv.height/4);var list=DATA.wordcloud_data.map(function(d){return[d.text,mnF+(d.size/mx)*(mxF-mnF)]});var cm={};DATA.wordcloud_data.forEach(function(d){cm[d.text]=d.color});WordCloud(cv,{list:list,gridSize:8,weightFactor:1,fontFamily:"-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,sans-serif",color:function(w){return cm[w]||"#6366f1"},backgroundColor:"#1a1a2e",rotateRatio:0.1,click:function(item){var e=DATA.wordcloud_data.find(function(d){return d.text===item[0]});if(e){switchView("network");setTimeout(function(){focusNode(e.email)},300)}}})}
function renderLegend(){var c=document.getElementById("legend");while(c.firstChild)c.removeChild(c.firstChild);c.appendChild(el("h4",{textContent:"Communities"}));DATA.communities.forEach(function(comm){var names=comm.members.slice(0,3).map(function(m){return m.name}).join(", ");if(comm.size>3)names+=" +"+(comm.size-3);var item=el("div",{className:"legend-item"},[el("div",{className:"legend-dot",style:"background:"+comm.color}),el("span",{textContent:names})]);item.addEventListener("click",function(){highlightCommunity(comm.id)});c.appendChild(item)});if(DATA.analysis.cc_key_persons.length>0){c.appendChild(el("h4",{textContent:"Passive Observers",style:"margin-top:10px"}));DATA.analysis.cc_key_persons.forEach(function(p){var item=el("div",{className:"legend-item"},[el("div",{className:"legend-dot",style:"background:#f59e0b"}),el("span",{textContent:p.name+" ("+p.cc_count+")"})]);item.addEventListener("click",function(){focusNode(p.email)});c.appendChild(item)})}}
function highlightCommunity(ci){var comm=DATA.communities[ci];if(!comm)return;var ids=comm.members.map(function(m){return m.email});network.selectNodes(ids);network.fit({nodes:ids,animation:{duration:400,easingFunction:"easeInOutQuad"}})}
